<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f3eee4;
height:100vh;
overflow:hidden;
}

#app{
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.card{
position:absolute;
width:90%;
max-width:420px;
max-height:90vh;
overflow:auto;
background:#ffc9c9;
border-radius:26px;
padding:40px 32px;
text-align:center;
box-shadow:0 25px 60px rgba(107,62,46,.3);
opacity:0;
transform:scale(.94) translateY(40px);
transition:.7s cubic-bezier(.19,1,.22,1);
pointer-events:none;
}

.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{
background:#6B3E2E;
border-radius:10px
}

.card.active{
opacity:1;
transform:scale(1) translateY(0);
pointer-events:auto;
}

h1,h2{
font-family:'DM Serif Display',serif;
margin:0 0 14px;
color:#6B3E2E;
}

p{
font-size:18px;
line-height:1.7;
opacity:.9;
color:#3a1d12;
}

button{
padding:12px 26px;
border:none;
border-radius:999px;
background:#6B3E2E;
cursor:pointer;
margin-top:18px;
font-size:15px;
transition:.25s;
color:#F2EFEA;
}

button:hover{
transform:scale(1.05);
background:#4e2c20;
box-shadow:0 10px 25px rgba(107,62,46,.5);
}

/* PIN */
.pin-display{
display:flex;
justify-content:center;
gap:12px;
margin:25px 0;
}

.dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #6B3E2E;
}

.dot.fill{background:#6B3E2E}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.keypad button{
padding:16px;
font-size:18px;
border-radius:14px;
}

/* GAME */
#options{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

#options button{
background:#F2EFEA;
border:1px solid #6B3E2E;
color:#6B3E2E;
}

.score-box{
margin-top:22px;
font-size:15px;
letter-spacing:.5px;
color:#6B3E2E;
}

#feedback{
margin-top:14px;
min-height:22px;
font-size:14px;
transition:.3s;
color:#6B3E2E;
}

/* CORRECT */
.correctAnim{
animation:pop .4s ease;
background:#6B3E2E  !important;
border-color:#6B3E2E !important;
color:#F2EFEA !important;
}

/* WRONG */
.wrongAnim{
animation:shake .4s;
background:#C9A7A7 !important;
border-color:#4e2c20 !important;
color:#6B3E2E  !important;
}

/* TIMER */
.lovebox{
background:linear-gradient(145deg,#C9A7A7,#F2EFEA);
border-radius:22px;
padding:20px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(107,62,46,.3);
border:1px solid rgba(107,62,46,.2);
}

.timer-title{
font-size:12px;
letter-spacing:2px;
opacity:.7;
color:#6B3E2E;
}

.timer-display{
font-family:'DM Serif Display',serif;
font-size:28px;
margin-top:8px;
color:#6B3E2E;
letter-spacing:1px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{50%{opacity:.5}}

/* MEDIA */
.reveal-box{
margin:20px 0;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
border:2px dashed #6B3E2E;
cursor:pointer;
background:#F2EFEA;
transition:.3s;
}

.reveal-box:hover{transform:scale(1.02)}

/* LETTER FINAL */
.letter{
margin-top:22px;
font-family:'Cormorant Garamond',serif;
font-size:18px;
line-height:1.3;
letter-spacing:.4px;
text-align:left;
color:#46261b;
opacity:.95;
min-height:100px;
animation:fadeInText 1.2s ease;
white-space: pre-line;
}

.signature{
margin-top:32px;
text-align:right;
font-family:'Playfair Display',serif;
font-size:20px;
letter-spacing:1px;
color:#46261b;
animation:fadeInText 1.8s ease;
}

@keyframes fadeInText{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* HEART BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}


</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>

<audio id="bgm" src="s.mp3" loop></audio>
  
<div id="app">

<!-- welcome -->
<section class="card active">
<h1>My Dearest Boyfriend</h1>
<p>There's a tiny surprise I've been saving for you. <br> It won't show itself until you unlock it.</p>
<button onclick="next()">Unlock</button>
</section>

<!-- pin -->
<section class="card">
<h2>Enter the code 🔐</h2>
<div class="pin-display" id="pin"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>
</div>
</section>

<!-- quiz -->
<section class="card">
<h2 id="question">Little game 🎮</h2>
<p>Answer correctly to earn points</p>
<div id="options"></div>

<div class="score-box">
Points: <span id="score">0</span> / 10
</div>

<p id="feedback"></p>
</section>

<!-- final -->
<section class="card">

<h1>The Love of My Life</h1>

<div class="lovebox">
<div class="timer-title">TIME WITH YOU</div>
<div id="loveTimer" class="timer-display">loading...</div>
</div>

<div class="reveal-box" onclick="revealMemory(this)">
Tap to reveal our memory
</div>

<div id="letter" class="letter"></div>
<div id="sign" class="signature"></div>

</section>

</div>

<script>

/* =================================================
   SLIDE NAVIGATION
================================================= */

const cards=document.querySelectorAll('.card');
let page=0;
const music=document.getElementById("bgm");
music.volume=0.4;
let musicStarted=false;

function show(){
cards.forEach(c=>c.classList.remove('active'));
cards[page].classList.add('active');
if(page===3)startTimer();
}

function next(){
page++;

if(page===1 && !musicStarted){
music.play();
musicStarted=true;
}

show();
if(page===2)loadQuestion();
}



/* =================================================
   PIN SYSTEM
================================================= */

let pinInput = '';
const correctPin = '0602';
const pinDisplay = document.getElementById("pin");

function renderDots(){
    pinDisplay.innerHTML = '';

    for(let i=0;i<4;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i < pinInput.length ? " fill" : "");
        pinDisplay.appendChild(d);
    }
}

renderDots();

function press(n){
    if(pinInput.length < 4){
        pinInput += n;
        renderDots();
    }
}

function clearPin(){
    pinInput = pinInput.slice(0,-1);
    renderDots();
}

function checkPin(){
    if(pinInput === correctPin){
        next();
    }else{
        pinDisplay.classList.add('shake');

        setTimeout(()=>{
            pinDisplay.classList.remove('shake');
        },400);

        pinInput = '';
        renderDots();
    }
}


/* =================================================
   QUIZ SYSTEM
================================================= */

const questions=[
{q:"When did we first meet?", options:["At a very classy place","At a random chaotic moment","In a romcom-worthy accident","I manifested you 🤭"],correct:3},
{q:"Why did I fall for you?", options:["You're a starboy","Because you're literally a Tifosi","Your vibe is cool","Your personality"],correct:1},
{q:"Who fell first?", options:["Me","You","At the same time","We are still falling"],correct:3},
{q:"What is our love language?", options:["Words of affirmation","Physical touch ","Bullying each other ","All of the above"],correct:3},
{q:"What's our couple aesthetic?", options:["Soft & wholesome ","Rich & chaotic","“We shouldn’t be this hot together”","Toxic but sexy "],correct:2},
{q:"Do you want to have kids with me?", options:["Yes","No","Maybe someday, 3 boys","We already have one"],correct:3},
{q:"Why do I feel like I could trust you with anything?", options:["You're honest","You're my safe place","You're kind","You're reliable"],correct:1},
{q:"Which word makes my heart race when you say it?", options:["Sayang","Cece","Wifey","All of the above"],correct:3},
{q:"My secret desire about you is:", options:["Cuddle forever","Tease you endlessly","Make sourdough together","Watch a horror movie"],correct:1},
{q:"Last Question: If I could give you a forever gift, it would be…", options:["My heart, wrapped in cute lingerie","A lifetime supply of bagels","A gecko","My Netflix password"],correct:0}
];

let currentQ = 0;
let score = 0;

const scoreEl = document.getElementById("score");
const question = document.getElementById("question");
const options = document.getElementById("options");
const feedback = document.getElementById("feedback");


function loadQuestion(){

    const q = questions[currentQ];

    question.textContent = q.q;
    options.innerHTML = "";
    feedback.textContent = "";

    q.options.forEach((opt,i)=>{
        const b = document.createElement("button");
        b.textContent = opt;
        b.onclick = () => checkAnswer(i,b);
        options.appendChild(b);
    });
}


function checkAnswer(i,btn){

    const q = questions[currentQ];

    if(i === q.correct){

        score++;
        scoreEl.textContent = score;

        btn.classList.add("correctAnim");
        feedback.textContent = "Correct🤍";

        setTimeout(()=>{
            currentQ++;

            if(currentQ < questions.length){
                loadQuestion();
            }else{
                next();
            }
        },900);

    }else{

        btn.classList.add("wrongAnim");
        feedback.textContent = "Oh no, Try again!";
    }
}


/* =================================================
   RELATIONSHIP TIMER
================================================= */

function startTimer(){

    const start = new Date("2026-02-06T00:00:00");

    setInterval(()=>{

        const diff = new Date() - start;

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;

        loveTimer.textContent = `${d} days ${h}h ${m}m ${s}s`;

    },1000);
}


/* =================================================
   MEMORY REVEAL + TYPING LETTER
================================================= */

let alreadyRevealed = false;

function revealMemory(el){

    if(alreadyRevealed) return;
    alreadyRevealed = true;

    el.innerHTML = `
        <img src="pict.jpg"
        style="width:100%;height:100%;object-fit:cover;border-radius:18px">
    `;

    const text = `
    Happy two months of us, my love.

    I don't even know how to start this without smiling a little, because just thinking about us already makes everything feel softer. 
    
    I really, really like the 6th. It feels like it belongs to us. Like no matter how busy or messy things get, we still have this one date that quietly says, “hey, we're still here.” I don't say it enough, but I look forward to it so much. I look forward to you.
    
    I'm already excited for all the next 6ths with you. The ones where we celebrate, the ones where we're just existing together, the ones where I get to be close to you and call you mine like it's the most normal thing in the world. Because with you, it is.
    
    I think what I want sounds simple, but it means everything to me. I want to stay. I want to be yours in all the small, everyday ways. I want to take care of you, to check on you, to be the one you come to without thinking twice. I want to be soft with you, and I want you to be soft with me too.
    
    I want to grow older with you, slowly and happily, side by side. I want more time with you, more memories, more simple days that somehow feel full just because I have you, days that don't feel little at all because I get to spend them with you.
    
    You feel like home to me. Like someone I can hold onto and never get tired of.
    
    Let's catch every 6th together, just you and me.  `;

    const paragraphs = text.split("\n\n");

    const letter = document.getElementById("letter");
    const sign = document.getElementById("sign");

    if(!letter || !sign) return console.error("Letter or Sign element missing");

    let p=0;
    let i=0;

    function typeParagraph(){

        if(p>=paragraphs.length){
            sign.innerHTML="Ever and eternally yours,<br> Kenny";
            return;
        }

        const para=document.createElement("p");
        letter.appendChild(para);

        const typing=setInterval(()=>{
            para.innerHTML+=paragraphs[p].charAt(i);
            i++;

            if(i>=paragraphs[p].length){
                clearInterval(typing);
                p++;
                i=0;
                setTimeout(typeParagraph,350);
            }

        },30);
    }

    typeParagraph();
}


/* =================================================
   FLOATING HEARTS BACKGROUND
================================================= */
const canvas=document.getElementById("confettiCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

const colors=[
"rgba(107,62,46,0.35)",   // #6B3E2E (chocolate)
"rgba(201,167,167,0.35)", // #C9A7A7 (dusty rose)
"rgba(242,239,234,0.35)"  // #F2EFEA (soft cream)
];

let hearts=[];
for(let i=0;i<140;i++){
hearts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*6+2,
v:Math.random()*0.6+0.2,
c:colors[Math.floor(Math.random()*colors.length)]
});
}

function heart(x,y,s){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
ctx.bezierCurveTo(x-s,y+s,x,y+s*1.4,x,y+s*1.8);
ctx.bezierCurveTo(x,y+s*1.4,x+s,y+s,x+s,y);
ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
ctx.fill();
}

function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.shadowColor="rgba(107,62,46,0.5)";
ctx.shadowBlur=10;

hearts.forEach(h=>{
ctx.fillStyle=h.c;
heart(h.x,h.y,h.s);
h.y+=h.v;
if(h.y>canvas.height){
h.y=-90;
h.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
